version: '3.8'

services:
  hr-app-postgres:
    image: postgres:18-alpine
    container_name: hr-app-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - hr-app-postgres-data:/var/lib/postgresql/data

volumes:
  hr-app-postgres-data:
