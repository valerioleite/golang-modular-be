basePath: /api/tenant
definitions:
  CreateTenantRequest:
    properties:
      name:
        type: string
    type: object
  ErrorResponse:
    properties:
      errors:
        items:
          type: string
        type: array
      timestamp:
        type: string
    type: object
  HealthResponse:
    properties:
      module:
        type: string
      status:
        type: string
    type: object
  TenantResponse:
    properties:
      banner:
        type: string
      id:
        type: string
      logo:
        type: string
      name:
        type: string
    type: object
  UpdateTenantRequest:
    properties:
      banner:
        type: string
      logo:
        type: string
      name:
        type: string
    type: object
info:
  contact: {}
  title: Tenant API
  version: "1.0"
paths:
  /v1/actuator/health:
    get:
      description: Returns the health status of the tenant module.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/HealthResponse'
      summary: Health check
      tags:
      - Actuator
  /v1/tenants:
    get:
      description: Retrieves all tenants.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/TenantResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: List all tenants
      tags:
      - Tenant
    post:
      consumes:
      - application/json
      description: Creates a new tenant.
      parameters:
      - description: Create tenant request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/CreateTenantRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/TenantResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Create tenant
      tags:
      - Tenant
  /v1/tenants/{id}:
    delete:
      description: Deletes a tenant by ID.
      parameters:
      - description: Tenant ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Delete tenant
      tags:
      - Tenant
    get:
      description: Retrieves a tenant by its ID.
      parameters:
      - description: Tenant ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/TenantResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Get tenant by ID
      tags:
      - Tenant
    put:
      consumes:
      - application/json
      description: Updates an existing tenant.
      parameters:
      - description: Tenant ID
        in: path
        name: id
        required: true
        type: string
      - description: Update tenant request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/UpdateTenantRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/TenantResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Update tenant
      tags:
      - Tenant
  /v1/tenants/{id}/image:
    put:
      consumes:
      - multipart/form-data
      description: Updates tenant logo or banner image.
      parameters:
      - description: Tenant ID
        in: path
        name: id
        required: true
        type: string
      - description: Image type (logo or banner)
        in: formData
        name: type
        required: true
        type: string
      - description: Image file
        in: formData
        name: image
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/TenantResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Update tenant image
      tags:
      - Tenant
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
