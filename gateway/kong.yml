_format_version: "3.0"
_transform: true

plugins:
  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      echo_downstream: true
      generator: uuid
  - name: file-log
    config:
      path: /dev/stdout
      reopen: true
  - name: request-transformer
    config:
      add:
        headers:
          - "X-Gateway: Kong"

services:
  - name: authentication-public-service
    url: $AUTHENTICATION_SERVICE_URL
    routes:
      - name: authentication-swagger-route
        paths:
          - /api/authentication/swagger
        strip_path: false
        preserve_host: true
      - name: authentication-health-route
        paths:
          - /api/authentication/v1/actuator/health
        methods:
          - GET
        strip_path: false
        preserve_host: true
      - name: authentication-authorize-route
        paths:
          - /api/authentication/v1/authentication/authorize
        methods:
          - GET
        strip_path: false
        preserve_host: true
      - name: authentication-callback-get-route
        paths:
          - /api/authentication/v1/authentication/callback
        methods:
          - GET
        strip_path: false
        preserve_host: true
      - name: authentication-callback-post-route
        paths:
          - /api/authentication/v1/authentication/callback
        methods:
          - POST
        strip_path: false
        preserve_host: true

  - name: authentication-private-service
    url: $AUTHENTICATION_SERVICE_URL
    routes:
      - name: authentication-private-route
        paths:
          - /api/authentication
        strip_path: false
        preserve_host: true
    plugins:
      - name: token-validator

  - name: user-public-service
    url: $USER_SERVICE_URL
    routes:
      - name: user-swagger-route
        paths:
          - /api/user/swagger
        strip_path: false
        preserve_host: true
      - name: user-health-route
        paths:
          - /api/user/v1/actuator/health
        methods:
          - GET
        strip_path: false
        preserve_host: true

  - name: user-private-service
    url: $USER_SERVICE_URL
    routes:
      - name: user-private-route
        paths:
          - /api/user
        strip_path: false
        preserve_host: true
    plugins:
      - name: token-validator
